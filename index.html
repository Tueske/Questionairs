    const CONSTRAINTS = [
      { id: 'c_visuo', text: 'Strukturierungsschwäche: Fällt es Teilen der Gruppe merklich schwer, Tabellen anzulegen oder Rechenwege räumlich sauber untereinander zu notieren, was häufig zu Folgefehlern führt?' },
      { id: 'c_speed', text: 'Arbeitsgedächtnis/Bottleneck: Bricht der Rechenprozess bei komplexen mehrschrittigen Aufgaben ab, weil Lernende nach einer Nebenrechnung das eigentliche Hauptziel vergessen haben?' },
      { id: 'c_lang', text: 'Sprachbarriere: Ist das Übersetzen von Textaufgaben primär durch mangelndes Leseverständnis gehemmt (nicht durch fehlende mathematische Logik)?' }

    // Helper: Berechnet das curriculare Erwartungslevel
    function getExpectedLevel(school, grade, course) {
      if (school === 'foe') {
        if (['Kl. 1', 'Kl. 2', 'JüL 1-2', 'JüL 1-3'].includes(grade)) return 3;
        if (['Kl. 3', 'Kl. 4'].includes(grade)) return 4;
        if (['Kl. 5', 'Kl. 6', 'Kl. 7', 'Kl. 8'].includes(grade)) return 5;
        if (['Kl. 9', 'Kl. 10'].includes(grade)) return 6;
      }
      if (school === 'gs') {
        if (['Kl. 1', 'JüL 1-2'].includes(grade)) return 3;
        if (['Kl. 2', 'JüL 1-3'].includes(grade)) return 4;
        if (['Kl. 3', 'Kl. 4'].includes(grade)) return 5;
        if (['Kl. 5', 'Kl. 6'].includes(grade)) return 6;
      }
      if (['iss', 'ges'].includes(school)) {
        if (['Kl. 1', 'JüL 1-2'].includes(grade)) return 3;
        if (['Kl. 2', 'JüL 1-3'].includes(grade)) return 4;
        if (['Kl. 3', 'Kl. 4'].includes(grade)) return 5;
        if (['Kl. 5', 'Kl. 6', 'Kl. 7', 'Kl. 8'].includes(grade)) return 6;
        if (['Kl. 9', 'Kl. 10'].includes(grade)) return course === 'ek' ? 7 : 6;
        if (['Oberstufe (11-13)'].includes(grade)) return course === 'lk' ? 8 : 7;
      }
      if (school === 'gym') {
        if (['Kl. 7'].includes(grade)) return 6;
        if (['Kl. 8', 'Kl. 9'].includes(grade)) return 7;
        if (['Kl. 10'].includes(grade)) return 8;
        if (['Q-Phase (11/12)'].includes(grade)) return 8; 
      }
      return 5; 
    }

    function App() {
      const [view, setView] = useState('setup'); 
      const [schoolType, setSchoolType] = useState('gs');
      const [grade, setGrade] = useState('Kl. 3');
      const [course, setCourse] = useState(null);
      
      const [answers, setAnswers] = useState({});
      const [constraintAnswers, setConstraintAnswers] = useState({});

      useEffect(() => {
        setGrade(GRADES[schoolType][0]);
        setCourse(null);
      }, [schoolType]);

      const expectedLevel = getExpectedLevel(schoolType, grade, course);
      const activeScenarios = SCENARIOS_BY_EXPECTED_LEVEL[expectedLevel] || SCENARIOS_BY_EXPECTED_LEVEL[5];

      const needsCourseSelection = () => {
        if (['iss', 'ges'].includes(schoolType) && ['Kl. 9', 'Kl. 10'].includes(grade)) return 'iss_9_10';
        if (['iss', 'ges'].includes(schoolType) && grade === 'Oberstufe (11-13)') return 'iss_oberstufe';
        if (schoolType === 'gym' && grade === 'Q-Phase (11/12)') return 'gym_qphase';
        return null;
      };

      const courseOptionsId = needsCourseSelection();

      const handleLevelSelect = (scenarioId, level) => {
        setAnswers(prev => ({ ...prev, [scenarioId]: level }));
      };

      const handleConstraintSelect = (cId, value) => {
        setConstraintAnswers(prev => ({ ...prev, [cId]: value }));
      };

      const canStartAssessment = () => {
        if (courseOptionsId && !course) return false;
        return true;
      };

      const isComplete = () => {
        const questionsAnswered = activeScenarios.every(s => answers[s.id] !== undefined);
        const constraintsAnswered = CONSTRAINTS.every(c => constraintAnswers[c.id] !== undefined);
        return questionsAnswered && constraintsAnswered;
      };

      const evaluateResults = () => {
        const selectedLevels = Object.values(answers);
        const sum = selectedLevels.reduce((a, b) => a + b, 0);
        const avg = sum / selectedLevels.length;
        const dominantLevel = Math.round(avg);
        
        const minLevel = Math.min(...selectedLevels);
        const maxLevel = Math.max(...selectedLevels);

        const activeConstraints = CONSTRAINTS.filter(c => constraintAnswers[c.id] === 'yes');

        return { dominantLevel, minLevel, maxLevel, activeConstraints };
      };

      const renderSetup = () => (
        <div className="animate-in fade-in space-y-6">
          <div className="bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200">
            <h2 className="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-3">
              <Settings className="text-blue-600" size={28} /> 
              Schritt 1: Curriculare Basislinie
            </h2>
            <p className="text-slate-600 mb-6 leading-relaxed">
              Wählen Sie Schulform, Klasse und ggf. das Kursniveau aus. Das Tool errechnet daraus den Erwartungshorizont und generiert Fragen, die <strong>bewusst bis zu zwei kognitive Level unter diesem Erwartungswert starten</strong>, um auch massive Förderbedarfe abzubilden.
              <br /><br />
              <span className="font-bold text-blue-900 bg-blue-100 px-2 py-1 rounded">Wichtig:</span> Es geht hier nicht um Faktenwissen, sondern um das <strong>kognitive Herangehen</strong>. Falls ein Thema noch nicht behandelt wurde, antizipieren Sie: <em>Wie erwarten Sie, dass Ihre Lerngruppe diese Aufgabe intuitiv angehen würde?</em>
            </p>
            
            <div className="space-y-6 bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <div>
                <label className="block text-sm font-bold tracking-wide uppercase text-slate-500 mb-2">1. Schulform</label>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {SCHOOL_TYPES.map(s => (
                    <button
                      key={s.id}
                      onClick={() => setSchoolType(s.id)}
                      className={`py-3 px-4 rounded-xl font-bold border-2 text-left transition-all ${
                        schoolType === s.id ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300'
                      }`}
                    >
                      {s.label}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-sm font-bold tracking-wide uppercase text-slate-500 mb-2">2. Klassenstufe</label>
                <div className="flex flex-wrap gap-2">
                  {GRADES[schoolType].map(g => (
                    <button
                      key={g}
                      onClick={() => { setGrade(g); setCourse(null); }}
                      className={`py-2 px-4 rounded-lg font-semibold border-2 transition-all ${
                        grade === g ? 'border-blue-600 bg-blue-600 text-white shadow-sm' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300'
                      }`}
                    >
                      {g}
                    </button>
                  ))}
                </div>
              </div>

              {courseOptionsId && (
                <div className="animate-in fade-in slide-in-from-top-2">
                  <label className="block text-sm font-bold tracking-wide uppercase text-slate-500 mb-2">3. Kursniveau</label>
                  <div className="grid grid-cols-2 gap-3">
                    {COURSES[courseOptionsId].map(c => (
                      <button
                        key={c.id}
                        onClick={() => setCourse(c.id)}
                        className={`py-3 px-4 rounded-xl font-bold border-2 transition-all ${
                          course === c.id ? 'border-amber-500 bg-amber-50 text-amber-700 shadow-sm' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300'
                        }`}
                      >
                        {c.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <div className="mt-6 pt-4 border-t border-slate-100 flex items-center gap-3">
                 <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-700 font-black flex items-center justify-center text-lg">{expectedLevel}</div>
                 <div className="text-sm text-slate-600">
                   <strong>Erwarteter Ziel-Level im Lehrplan: {expectedLevel}</strong><br/>
                   Diagnostik wird für die Level {Math.max(1, expectedLevel - 2)} bis {Math.min(10, expectedLevel + 1)} generiert.
                 </div>
              </div>
            </div>
          </div>

          <button
            onClick={() => { setAnswers({}); setConstraintAnswers({}); setView('assessment'); }}
            disabled={!canStartAssessment()}
            className={`w-full py-5 rounded-xl font-bold text-lg shadow-md transition-all flex justify-center items-center gap-2 group ${
              canStartAssessment() ? 'bg-blue-600 hover:bg-blue-700 text-white cursor-pointer' : 'bg-slate-200 text-slate-400 cursor-not-allowed'
            }`}
          >
            Lernstandsdiagnostik starten 
            {canStartAssessment() && <ChevronRight className="group-hover:translate-x-1 transition-transform" size={24} />}
          </button>
        </div>
      );

      const renderAssessment = () => {
        return (
          <div className="animate-in slide-in-from-right-4 space-y-8">
            <div className="border-b border-slate-200 pb-4">
              <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-3">
                <BrainCircuit className="text-blue-600" />
                Diagnostik kognitiver Übergänge
              </h2>
              <p className="text-slate-500 mt-2">
                Wählen Sie pro Szenario die Strategie aus, die das Handeln der <strong>Mehrheit</strong> Ihrer Lerngruppe am ehesten beschreibt (bzw. antizipiert beschreiben würde). 
              </p>
            </div>

            {activeScenarios.map((scenario, idx) => (
              <div key={scenario.id} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="bg-slate-50 p-5 border-b border-slate-200">
                  <span className="text-xs font-bold uppercase tracking-wider text-blue-600 mb-1 block">Szenario {idx + 1} • {scenario.topic}</span>
                  <p className="text-slate-800 font-medium text-lg leading-relaxed">{scenario.situation}</p>
                </div>
                
                <div className="p-5 space-y-3">
                  {scenario.options.map((opt, oIdx) => (
                    <button
                      key={oIdx}
                      onClick={() => handleLevelSelect(scenario.id, opt.level)}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-3 ${
                        answers[scenario.id] === opt.level
                          ? 'border-blue-600 bg-blue-50/50'
                          : 'border-slate-100 bg-white hover:border-slate-300 hover:bg-slate-50'
                      }`}
                    >
                      <div className={`mt-0.5 flex-shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                        answers[scenario.id] === opt.level ? 'border-blue-600' : 'border-slate-300'
                      }`}>
                        {answers[scenario.id] === opt.level && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full" />}
                      </div>
                      <p className={`text-sm md:text-base leading-relaxed ${answers[scenario.id] === opt.level ? 'text-blue-900 font-medium' : 'text-slate-600'}`}>
                        {opt.text}
                      </p>
                    </button>
                  ))}
                </div>
              </div>
            ))}

            <div className="space-y-6 pt-6 border-t-2 border-dashed border-slate-200">
              <h3 className="font-bold text-xl text-slate-800 flex items-center gap-2">
                <AlertTriangle className="text-amber-500" /> Domänenübergreifende Einschränkungen
              </h3>
              
              <div className="grid gap-4">
                {CONSTRAINTS.map(c => (
                  <div key={c.id} className="bg-amber-50/50 p-4 rounded-xl border border-amber-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <p className="text-slate-700 text-sm md:text-base font-medium flex-1">{c.text}</p>
                    <div className="flex gap-2 flex-shrink-0">
                      <button
                        onClick={() => handleConstraintSelect(c.id, 'no')}
                        className={`px-4 py-2 text-sm font-bold rounded-lg border-2 transition-colors ${
                          constraintAnswers[c.id] === 'no' ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-300'
                        }`}
                      >
                        Nein
                      </button>
                      <button
                        onClick={() => handleConstraintSelect(c.id, 'yes')}
                        className={`px-4 py-2 text-sm font-bold rounded-lg border-2 transition-colors ${
                          constraintAnswers[c.id] === 'yes' ? 'bg-amber-500 text-white border-amber-500' : 'bg-white text-amber-600 border-amber-200 hover:bg-amber-100'
                        }`}
                      >
                        Ja, zutreffend
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex flex-col sm:flex-row gap-4 pt-4">
              <button
                onClick={() => setView('setup')}
                className="flex-1 py-4 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition-colors"
              >
                Zurück zur Auswahl
              </button>
              <button
                onClick={() => setView('result')}
                disabled={!isComplete()}
                className={`flex-1 py-4 rounded-xl font-bold text-lg transition-all flex justify-center items-center gap-2 ${
                  isComplete() 
                    ? 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-lg shadow-emerald-200' 
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                }`}
              >
                Didaktisches Profil auswerten <CheckCircle size={20} />
              </button>
            </div>
          </div>
        );
      };

      const renderResult = () => {
        const { dominantLevel, minLevel, maxLevel, activeConstraints } = evaluateResults();
        
        const levelTitles = {
          1: 'Level 1: Basal-perzeptiv',
          2: 'Level 2: Intentional-partizipativ',
          3: 'Level 3: Pränumerische Größenunterscheidung',
          4: 'Level 4: Zählprozeduren & Vor-Systematik',
          5: 'Level 5: Konkret-handelnd (enaktiv)',
          6: 'Level 6: Bildhaft-darstellend (ikonisch)',
          7: 'Level 7: Abstrakt-symbolisch (Werkzeugnutzung)',
          8: 'Level 8: Formal-analytisch (Strukturreflexion)',
          9: 'Level 9: Heuristisch-generativ (Transfer)'
        };

        const isBelowExpectation = dominantLevel < expectedLevel;

        return (
          <div className="animate-in zoom-in-95 duration-500 space-y-8">
            
            <div className="bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden">
              <div className="bg-slate-900 p-8 text-center text-white relative">
                <div className="absolute top-0 right-0 p-4 opacity-10">
                  <BrainCircuit size={120} />
                </div>
                <h2 className="text-sm font-bold uppercase tracking-widest text-slate-400 mb-3 relative z-10">Ermitteltes operatives Kognitionsniveau</h2>
                <div className="text-7xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-emerald-400 relative z-10">
                  Level {dominantLevel}
                </div>
                <div className="text-xl sm:text-2xl font-medium text-slate-300 relative z-10">{levelTitles[dominantLevel] || `Level ${dominantLevel}`}</div>
                
                {isBelowExpectation && (
                   <div className="mt-4 bg-amber-500/20 text-amber-200 py-2 px-4 rounded-lg text-sm inline-block font-semibold">
                     Achtung: Die Lerngruppe agiert {expectedLevel - dominantLevel} Level unter dem curricularen Standard (L{expectedLevel}).
                   </div>
                )}

                {minLevel !== maxLevel && (
                  <div className="mt-6 pt-4 border-t border-slate-800 text-sm text-slate-400">
                    Heterogenität: Lösungsstrategien streuen in der Klasse zwischen Level {minLevel} und {maxLevel}.
                  </div>
                )}
              </div>
            </div>

            <div className="bg-blue-50 p-6 sm:p-8 rounded-2xl border border-blue-100 shadow-sm relative">
              <div className="absolute top-0 right-0 p-6 opacity-5">
                <BookOpen size={100} className="text-blue-900" />
              </div>
              <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2 relative z-10">
                Materialgestaltung & Differenzierung 
              </h3>
              
              <div className="space-y-8 relative z-10">
                
                <div className="bg-white p-6 rounded-xl border border-blue-100 shadow-sm">
                  <h4 className="font-bold text-blue-900 mb-3 text-lg flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full bg-blue-600"></div> Didaktischer Kernfokus
                  </h4>
                  <p className="text-slate-700 leading-relaxed text-lg">
                    {dominantLevel <= 3 && "Massiver Förderbedarf in der Pränumerik: Die SuS sind noch dabei, das Mengen- und Operationsverständnis aufzubauen. Fokussieren Sie auf basale Alltagsbezüge und das handgreifliche Be-Greifen von 'mehr', 'weniger' und 'gleich'. Formale Zahlen und Rechenzeichen (wie + und -) sind hier oft noch leere Symbole."}
                    
                    {dominantLevel === 4 && "Übergangsphase zur Mengenerfassung: Die SuS zählen oft noch stark abzählend (mit Fingern). Der Fokus liegt nun darauf, zählende Strategien abzulösen. Üben Sie intensiv das strukturierte Legen von Material (Zehnerfeld) und das blitzartige simultane Erfassen kleiner Mengen (Subitizing)."}
                    
                    {dominantLevel === 5 && "Vorsicht bei Abstraktionen! Die SuS benötigen zwingend die Rückübersetzung formaler Aufgaben in greifbare Handlungen. Bevor formale Rechenregeln (wie Zehnerübergang, Brüche oder Gleichungsumformungen) geübt werden, müssen diese mit konkretem Material (Wendeplättchen, Bruchrechenkreise, Spielgeld, Waagemodell) haptisch verstanden sein."}
                    
                    {dominantLevel === 6 && "Ihre Lerngruppe benötigt zwingend die 'Ikonische Brücke'. Strukturieren Sie Arbeitsblätter stark bildhaft (Streckenmodelle, Baumdiagramme, Skizzen). Ermutigen Sie die SuS, Sachaufgaben zuerst exakt in eine Zeichnung zu übersetzen und am Bild zu rechnen, bevor sie eine formale Gleichung aufstellen. Der Verzicht auf die Skizze führt schnell zum Abbruch."}
                    
                    {dominantLevel === 7 && "Die SuS nutzen die formale Mathematik bereits abstrakt als Werkzeug. Reine 'Päckchenrechnungen' unterfordern diese Kompetenz. Fokus auf Mathematisierungsprozesse: Geben Sie 'unaufgeräumte' Sachsituationen vor und trainieren Sie gezielt das Aufstellen formaler Gleichungsmodelle. Skizzen werden hier flexibel (z. B. als kurzer Reality-Check) genutzt."}
                    
                    {dominantLevel === 8 && "Die Lerngruppe operiert sicher abstrakt. Nutzen Sie komplexe Formate zur Strukturreflexion: Lassen Sie fehlerhafte Lösungswege analysieren, vergleichen Sie die Effizienz von Algorithmen (z.B. Einsetzungs- vs. Additionsverfahren) und fordern Sie mathematische Begründungen, Plausibilitätsprüfungen und Argumentationen ein."}

                    {dominantLevel >= 9 && "Exzellentes Abstraktionsniveau. Die Lerngruppe sollte mit offenen Modellierungs- und Beweisaufgaben konfrontiert werden. Das bloße Abarbeiten bekannter Schemata unterfordert sie. Fordern Sie Verallgemeinerungen (z.B. Arbeit mit Scharparametern) und eigenständige Herleitungen von Axiomen."}
                  </p>
                </div>

                {activeConstraints.length > 0 && (
                  <div>
                    <h4 className="font-bold text-amber-900 mb-3 text-lg border-b border-amber-200 pb-2">Erforderliche Nachteilsausgleiche</h4>
                    <div className="grid gap-3">
                      {activeConstraints.map(c => (
                        <div key={c.id} className="bg-amber-50 p-4 rounded-lg border border-amber-200 flex gap-3 items-start">
                          <AlertTriangle className="text-amber-500 flex-shrink-0 mt-0.5" size={20} />
                          <p className="text-amber-900 leading-relaxed">
                            {c.id === 'c_visuo' && "Visueller Nachteilsausgleich: Nutzen Sie größere Karos (z. B. 7mm), geben Sie Gitternetze für Schrägbilder vor und reduzieren Sie die Informationsdichte auf Arbeitsblättern massiv (viel Weißraum)."}
                            {c.id === 'c_speed' && "Arbeitsgedächtnis entlasten: Unterteilen Sie komplexe Aufgabenstrukturen (wie Strahlensätze, Textaufgaben) in explizite Teilschritte (a, b, c). Geben Sie Zwischenergebnisse zur Selbstkontrolle an, damit der 'rote Faden' nicht reißt."}
                            {c.id === 'c_lang' && "Sprachsensibler Mathematikunterricht: Reduzieren Sie narrative Ausschmückungen in Sachaufgaben drastisch. Nutzen Sie Scaffolding (Vokabellisten für z. B. 'verdoppelt', 'Rabatt') und koppeln Sie Textangaben stets an visuelle Anker."}
                          </p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-col sm:flex-row gap-4 pt-4">
              <button
                onClick={() => setView('assessment')}
                className="flex-1 py-4 bg-white border-2 border-slate-200 text-slate-700 rounded-xl font-bold hover:border-slate-300 hover:bg-slate-50 transition-all"
              >
                Eingaben anpassen
              </button>
              <button
                onClick={() => { setView('setup'); setAnswers({}); setConstraintAnswers({}); setCourse(null); }}
                className="flex-1 py-4 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition-colors"
              >
                Neue Diagnostik starten
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen py-10 px-4 sm:px-6 font-sans text-slate-900">
          <div className="max-w-3xl mx-auto">
            <h1 className="text-3xl sm:text-4xl font-black text-slate-900 tracking-tight mb-2 text-center">Diagnostik: Kognitive Übergänge</h1>
            <p className="text-slate-500 text-center mb-10 text-lg">Ein Instrument zur theoriegeleiteten Materialdifferenzierung im Fachbereich Mathematik</p>

            {view === 'setup' && renderSetup()}
            {view === 'assessment' && renderAssessment()}
            {view === 'result' && renderResult()}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
